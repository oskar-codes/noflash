<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Template</title>
  <meta name="description" content="An ongoing index of visual references.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation + filter controls ───────────────────── -->
  <header class="site-header">
    <!-- Populated by nav.js -->
    <div class="filter-bar" hidden>
      <p class="filter-description"></p>
      <button class="filter-reset">Show all</button>
    </div>
  </header>

  <!-- ── Gallery grid ────────────────────────────────────── -->
  <main class="index">
    <p>NO FLASH is an architecture practice still in the process of defining itself.
      <!--
      <br>
      A flash doesn't just illuminate. It interferes, flattens, exaggerates and imposes a momentary effect onto something that already has its own conditions.
      <br>
      NO FLASH is a refusal to default to that interference.
      -->
    </p>
  </main>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script src="nav.js"></script>
  <script src="gallery.js"></script>
  <script>
    Gallery.init({ dataFile: 'data.json' });
  </script>

</body>
</html>
