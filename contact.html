<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Template</title>
  <meta name="description" content="An ongoing index of visual references.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation + filter controls ───────────────────── -->
  <header class="site-header">
    <!-- Populated by nav.js -->
    <div class="filter-bar" hidden>
      <p class="filter-description"></p>
      <button class="filter-reset">Show all</button>
    </div>
  </header>

  <!-- ── Gallery grid ────────────────────────────────────── -->
  <main class="index">
    <p>NO FLASH Field Office ─
      <a href="https://maps.app.goo.gl/gj37XQMtXCTEVcuA6" target="_blank" rel="noopener">Avløysholmen, 8408 Sandset, Norway</a>
    </p>
  </main>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script src="nav.js"></script>
  <script src="gallery.js"></script>
  <script>
    Gallery.init({ dataFile: 'data.json' });
  </script>

</body>
</html>
