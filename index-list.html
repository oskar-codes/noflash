<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Index — No Flash</title>
  <meta name="description" content="An ongoing index of visual references.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation ──────────────────────────────────────── -->
  <header class="site-header">
    <!-- Populated by nav.js -->
  </header>

  <!-- ── Vars table ──────────────────────────────────────── -->
  <main class="index">
    <table class="vars-table" id="vars-table">
      <tbody id="vars-tbody"></tbody>
    </table>
  </main>

  <script src="nav.js"></script>
  <script src="transition.js"></script>
  <script src="vars-list.js"></script>
  <script>
    // On direct page load, initVarsList() must be called here.
    // On transitions, transition.js calls window.initVarsList() via LIST_PAGES.
    if (typeof window.initVarsList === 'function') {
      window.initVarsList().catch(err => console.error('[VarsList] Error:', err));
    }
  </script>

</body>
</html>
