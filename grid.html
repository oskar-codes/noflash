<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Template</title>
  <meta name="description" content="An ongoing index of visual references.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation + filter controls ───────────────────── -->
  <header class="site-header">
    <!-- Populated by nav.js -->
    <div class="filter-bar" hidden>
      <p class="filter-description"></p>
      <button class="filter-reset">Reset Selection</button>
    </div>
  </header>

  <!-- ── Gallery grid ────────────────────────────────────── -->
  <main class="index">
    <div class="index-list"></div>
    <div class="index-sentinel" aria-hidden="true"></div>
    <div class="index-status" role="status" aria-live="polite">Loading…</div>
  </main>

  <!-- ── Lightbox ────────────────────────────────────────── -->
  <dialog class="lightbox" closedby="closerequest">
    <img class="lightbox-img" src="" alt="">
    <button class="lightbox-close-btn" aria-label="Close lightbox">Close</button>
  </dialog>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script src="nav.js"></script>
  <script src="gallery.js"></script>
  <script>
    Gallery.init({ dataFile: 'data.json' });
  </script>

</body>
</html>
